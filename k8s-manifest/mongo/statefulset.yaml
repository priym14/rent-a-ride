apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: ecom
spec:
  serviceName: mongodb-svc
  replicas: 1 

  selector:
    matchLabels:
      app: mongodb

  template:
    metadata:
      labels:
        app: mongodb

    spec:
      containers:
        - name: mongodb
          image: mongo:6.0
          ports:
            - containerPort: 27017

          envFrom:
            - secretRef:
                name: mongo-secret

          volumeMounts:
            - name: mongo-data
              mountPath: /data/db

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: mongo-ebs-sc
        resources:
          requests:
            storage: 5Gi